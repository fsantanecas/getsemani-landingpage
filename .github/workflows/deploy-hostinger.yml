name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        run: npm run build

      - name: Deploy to Hostinger via rsync/SSH
        uses: easingthemes/ssh-deploy@v6
        with:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          REMOTE_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          REMOTE_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          TARGET: ${{ secrets.HOSTINGER_REMOTE_PATH }}
          SOURCE: 'out/'
          ARGS: '-rlgoDzvc -i --delete'
